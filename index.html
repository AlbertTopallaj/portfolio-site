<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="Assets/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="icon" href="Assets/faviconportfolio.png" type="image/png" />
    <title>Under renovering | Albert Topallaj Portfolio</title>

  <body>
    <section class="welcome-section">
      <h1 class="welcome-header">Välkommen till Albert Topallajs Portfolio</h1>
    </section>

    <section class="card-section">
      <a href="#projects-section">
        <div class="card">
          <i class="fa-solid fa-arrow-right"></i>
          <i class="fa-solid fa-folder fa-xl"></i>
          <p>Projekt</p>
          <span>Läs mer om mina projekt</span>
        </div>
      </a>

      <a href="#knowledge-section">
        <div class="card">
          <i class="fa-solid fa-arrow-right"></i>

          <span>Läs mer om mina kunskaper</span>
        </div>
      </a>

      <a href="#aboutme-section">
        <div class="card">
          <i class="fa-solid fa-arrow-right"></i>
          <i class="fa-solid fa-circle-user fa-xl"></i>
          <p>Om mig</p>
          <span>Läs mer om mig</span>
        </div>
      </a>

    <section id="projects-section" class="projects-section">
      <header class="projects-header">Mina projekt</header>

      <div class="card"></div>
    </section>

    <section id="knowledge-section" class="knowledge-section">
      <header class="knowledge-section">Mina kunskaper</header>

      <div class="card"></div>
    </section>

    <section id="aboutme-section" class="aboutme-section">
      <header class="aboutme-header">Om Albert Topallaj</header>

      <div class="card"></div>
    </section>

    <footer>
      <a href="https://www.linkedin.com/in/albert-topallaj-86541a330/"
        ><i class="fab fa-linkedin fa-2xl"></i
      ></a>
      <p>© <span id="year"></span> Albert Topallaj</p>
      <div></div>
    </footer>

    <script src="Assets/JavaScript/year.js"></script>
