<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="Assets/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"
/>
    <link rel="icon" href="Assets/faviconportfolio.png" type="image/png" />
    <title>Under renovering | Albert Topallaj Portfolio</title>
  </head>

  <body>
    <section class="welcome-section">
      <h1 class="welcome-header">Välkommen till Albert Topallajs Portfolio</h1>
    </section>

    <section class="card-section">
      <a href="#projects-section">
        <div class="card">
          <i class="fa-solid fa-arrow-right"></i>
          <i class="fa-solid fa-folder fa-xl"></i>
          <p>Projekt</p>
          <span>Läs mer om mina projekt</span>
        </div>
      </a>

      <a href="#knowledge-section">
        <div class="card">
          <i class="fa-solid fa-arrow-right"></i>
          <i class="fa-solid fa-lightbulb fa-xl"></i>
          <p>Kunskaper</p>
          <span>Läs mer om mina kunskaper</span>
        </div>
      </a>

      <a href="#aboutme-section">
        <div class="card">
          <i class="fa-solid fa-arrow-right"></i>
          <i class="fa-solid fa-circle-user fa-xl"></i>
          <p>Om mig</p>
          <span>Läs mer om mig</span>
        </div>
      </a>
    </section>

    <section class="section-subject" id="projects-section">
      <h1>Mina projekt</h1>
      <div class="section-card">
        <div class="project-wrapper">
        <div class="project-card blurred">
          <i class="fa-solid fa-folder fa-xl"></i>
          <div class="project-info">
            <p class="project-title">Projektnamn</p>
            <span>En kort beskrivning av projektet</span>
          </div>
        </div>
        <span class="coming-soon">Coming soon...</span>
        </div>
        </div>
      </div>
    </section>

    <footer>
      <a href="https://www.linkedin.com/in/albert-topallaj-86541a330/"
        ><i class="fab fa-linkedin fa-2xl"></i
      ></a>
      <p>© <span id="year"></span> Albert Topallaj</p>
      <div></div>
      <p class="sweden-develop">Developed in <span class="fi fi-se flag"></i></p>
    </footer>

    <script src="Assets/JavaScript/year.js"></script>
  </body>
</html>
